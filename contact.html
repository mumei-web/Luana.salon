<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  color:#333;
  background-image:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* ===== タイトル ===== */
h1 {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  letter-spacing: 6px;
  color: #8c6b3f;
  margin-top: 100px;   /* 上余白を増やして下げる */
  margin-bottom: 30px; /* ナビとの距離 */
}

/* ===== ナビ ===== */
.main-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  margin-bottom: 50px; /* 下の余白を広くして感覚を開ける */
}

.main-nav a {
  text-decoration: none;
  padding: 10px 22px;
  border-radius: 30px;
  background: rgba(255,255,255,0.7);
  color: #8c6b3f;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.6);
}

.main-nav a:hover {
  background: #8c6b3f;
  color: white;
}

/* ===== LINEボタン ===== */
.reserve-btn {
  display: inline-block;
  background: #06C755;
  color: #fff;
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* ===== 改行調整（PC・スマホ対応） ===== */
.pc-br::before {
  content: "\A";
  white-space: pre;
}

@media screen and (max-width: 768px) {
  .pc-br::before { content: ""; }

  /* スマホ用余白調整 */
  h1 {
    margin-top: 80px;    /* 少し下げる */
    margin-bottom: 25px; /* ナビとの距離 */
  }
  .main-nav {
    margin-top: 20px;
    margin-bottom: 40px;
  }

  /* スマホ用改行 */
  .pc-only { display: none !important; }
  .sp-only { display: inline !important; }
}

/* PC用表示切替 */
.pc-only { display: inline; }
.sp-only { display: none; }

.line-title{
  margin-top:10px;
  margin-bottom:15px;
}

</style>
</head>

<body>

<h1>CONTACT</h1>

<nav class="main-nav">
  <a href="index.html">HOME</a>
  <a href="menu.html">MENU</a>
  <a href="https://tol-app.jp/s/2vein6014q2k5wwbvw0y" target="_blank">RESERVE</a>
</nav>

<div class="container">

<section style="text-align:center; padding:60px 20px;">
  <h2 class="line-title">
    <span class="pc-only">公式LINEで簡単にご相談いただけます</span>
    <span class="sp-only">公式LINEで簡単に<br>ご相談いただけます</span>
  </h2>

  <p class="line-text">
    <span class="pc-only">
      ご予約のご相談・空き状況の確認は<br>
      公式LINEからお問い合わせください。<br><br>
      初めての方もお気軽にご連絡ください。<br><br>
      「ホームページを見ました」と送っていただくだけで大丈夫です。
    </span>

    <span class="sp-only">
      ご予約のご相談・空き状況の確認は<br>
      公式LINEからお問い合わせください。<br><br>
      初めての方もお気軽にご連絡ください。<br><br>
      「ホームページを見ました」と<br>
      送っていただくだけで大丈夫です。
    </span>
  </p>

  <a href="https://lin.ee/OgkEGmP" target="_blank" class="reserve-btn">
    LINEでお問い合わせする
  </a>
</section>

</div>

</body>
</html>
</body>
</html>
