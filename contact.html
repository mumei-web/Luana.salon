<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  color:#333;
  background-image:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* ===== タイトル ===== */
h1 {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  letter-spacing: 6px;
  color: #8c6b3f;
  margin-top: 60px;    /* ページ上から少し上 */
  margin-bottom: 20px; /* ナビとの距離 */
}

/* ===== ナビ ===== */
.main-nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;    /* h1 との距離 */
  margin-bottom: 40px; /* 下の余白 */
}

.main-nav a {
  text-decoration: none;
  padding: 10px 22px;
  border-radius: 30px;
  background: rgba(255,255,255,0.7);
  color: #8c6b3f;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.6);
}

.main-nav a:hover {
  background: #8c6b3f;
  color: white;
}

/* ===== LINEボタン ===== */
.reserve-btn {
  display: inline-block;
  background: #06C755;
  color: #fff;
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* ===== 改行調整（PC・スマホ対応） ===== */
.pc-br::before {
  content: "\A";
  white-space: pre;
}

@media screen and (max-width: 768px) {
  .pc-br::before {
    content: "";
  }
}

/* ===== スマホ用調整 ===== */
@media screen and (max-width: 768px) {
  h1 {
    margin-top: 40px;    /* スマホは少し上 */
    margin-bottom: 15px; /* ナビとの距離 */
  }

  .main-nav {
    margin-top: 15px;
    margin-bottom: 30px;
  }
}
  /* 初期状態 */
.pc-only { display: inline; }
.sp-only { display: none; }

/* スマホ表示 */
@media screen and (max-width: 768px) {
  .pc-only { display: none !important; }
  .sp-only { display: inline !important; }
}
</style>

</head>
